spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

server:
  port: ${PORT:8083}

# En produccion (Render) ms-organizacion corre standalone, sin Eureka
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
